app = "hvac-dispatcher"
primary_region = "ord"

[build]
  dockerfile = "Dockerfile"

[env]
  DB_PATH = "/data/dispatch.db"
  LOG_LEVEL = "INFO"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[mounts]
  source = "data"
  destination = "/data"
